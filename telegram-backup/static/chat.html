<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Telegram Backup — Chat</title>
<style>
:root {
  --bg:       #0e1621;
  --sidebar:  #17212b;
  --topbar:   #17212b;
  --input-bg: #17212b;
  --divider:  #0d1117;
  --recv:     #182533;
  --sent:     #2b5278;
  --text:     #d1d8e4;
  --muted:    #6d8499;
  --accent:   #64b5ef;
  --accent2:  #3390ec;
  --online:   #4dcd5e;
  --del:      #4a5568;
  --hover:    #202b38;
  --active:   #2b3f54;
  --date-bg:  rgba(14,22,33,.85);
  --shadow:   rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── Layout ─────────────────────────────────── */
#app{display:flex;height:100vh}
#sidebar{width:300px;min-width:300px;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid var(--divider)}
#chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}

/* ── Sidebar header ──────────────────────────── */
.sidebar-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--divider)}
.sidebar-header h2{font-size:16px;font-weight:600;color:var(--text)}
.sidebar-header .back-login{margin-left:auto;color:var(--accent);font-size:13px;text-decoration:none;opacity:.85}
.sidebar-header .back-login:hover{opacity:1}
#search-box{width:100%;padding:10px 16px;border-bottom:1px solid var(--divider)}
#search-box input{width:100%;padding:8px 14px;border-radius:20px;border:none;background:#0d1117;color:var(--text);font-size:14px;outline:none}
#search-box input::placeholder{color:var(--muted)}

/* ── Contact list ────────────────────────────── */
#contacts-list{flex:1;overflow-y:auto}
#contacts-list::-webkit-scrollbar{width:4px}
#contacts-list::-webkit-scrollbar-thumb{background:var(--active);border-radius:4px}
.contact-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(0,0,0,.15)}
.contact-item:hover{background:var(--hover)}
.contact-item.active{background:var(--active)}
.avatar{width:46px;height:46px;min-width:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#fff;text-transform:uppercase}
.contact-info{flex:1;min-width:0}
.contact-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.contact-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.contact-time{font-size:11px;color:var(--muted);white-space:nowrap}
.contact-preview{display:flex;align-items:center;gap:4px;margin-top:2px}
.contact-preview-text{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.badge{background:var(--accent2);color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}

/* ── Chat top bar ────────────────────────────── */
#chat-topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--topbar);border-bottom:1px solid var(--divider);min-height:56px}
#back-btn{display:none;cursor:pointer;padding:4px 8px 4px 0;color:var(--accent);font-size:22px;line-height:1}
#chat-avatar{width:38px;height:38px;min-width:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff}
#chat-name{font-size:16px;font-weight:600;color:var(--text)}
#chat-sub{font-size:12px;color:var(--muted);margin-top:1px}
#chat-actions{margin-left:auto;display:flex;gap:12px;color:var(--muted);font-size:13px}
#refresh-btn{cursor:pointer;color:var(--accent);font-size:20px;line-height:1;opacity:.8;transition:opacity .15s}
#refresh-btn:hover{opacity:1}

/* ── Messages area ───────────────────────────── */
#messages-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
#messages-area::-webkit-scrollbar{width:4px}
#messages-area::-webkit-scrollbar-thumb{background:var(--active);border-radius:4px}

/* load more */
#load-more-wrap{text-align:center;padding:6px 0 10px}
#load-more-btn{background:rgba(100,181,239,.12);border:1px solid rgba(100,181,239,.25);color:var(--accent);border-radius:16px;padding:6px 18px;font-size:13px;cursor:pointer;transition:background .15s}
#load-more-btn:hover{background:rgba(100,181,239,.2)}

/* date separator */
.date-sep{text-align:center;margin:12px 0 6px;position:relative}
.date-sep span{background:var(--date-bg);color:var(--muted);font-size:12px;padding:3px 12px;border-radius:12px;position:relative;z-index:1;border:1px solid rgba(255,255,255,.06)}

/* bubble row */
.msg-row{display:flex;margin-bottom:2px;max-width:100%}
.msg-row.sent{justify-content:flex-end}
.msg-row.received{justify-content:flex-start}
.msg-row.deleted{justify-content:flex-start;opacity:.6}

/* bubble */
.bubble{max-width:72%;padding:8px 12px 6px;border-radius:12px;position:relative;word-break:break-word;line-height:1.45}
.msg-row.sent .bubble{background:var(--sent);border-bottom-right-radius:4px}
.msg-row.received .bubble{background:var(--recv);border-bottom-left-radius:4px}
.msg-row.deleted .bubble{background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.12);border-bottom-left-radius:4px}

/* consecutive same-side bubbles */
.msg-row.sent + .msg-row.sent .bubble{border-top-right-radius:4px;border-bottom-right-radius:4px;margin-top:0}
.msg-row.received + .msg-row.received .bubble{border-top-left-radius:4px;border-bottom-left-radius:4px}

.bubble-text{font-size:14.5px;color:var(--text)}
.msg-row.deleted .bubble-text{color:var(--del);font-style:italic;font-size:13px}
.bubble-meta{display:flex;justify-content:flex-end;gap:4px;margin-top:4px;font-size:11px;color:rgba(255,255,255,.45);line-height:1}
.msg-row.sent .bubble-meta{color:rgba(255,255,255,.5)}
.tick{font-size:13px;color:var(--accent)}

/* ── Empty / placeholder states ──────────────── */
#no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
#no-chat svg{width:64px;height:64px;opacity:.3}
#no-chat p{font-size:15px}
.spinner-wrap{flex:1;display:flex;align-items:center;justify-content:center}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Mobile ──────────────────────────────────── */
@media(max-width:640px){
  #sidebar{width:100%;min-width:0;display:flex}
  #chat-area{display:none;position:fixed;inset:0;z-index:10}
  #back-btn{display:block}
  body.chat-open #sidebar{display:none}
  body.chat-open #chat-area{display:flex}
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sidebar-header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#64b5ef"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
      <h2>Backup Chats</h2>
      <a href="./index.html" class="back-login">← Login</a>
    </div>
    <div id="search-box">
      <input id="search-input" type="search" placeholder="Search contacts…" oninput="filterContacts()"/>
    </div>
    <div id="contacts-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>

  <!-- ── Chat area ── -->
  <div id="chat-area">
    <!-- top bar -->
    <div id="chat-topbar">
      <span id="back-btn" onclick="closeChat()">‹</span>
      <div id="chat-avatar" style="background:#5b7fa6"></div>
      <div>
        <div id="chat-name" style="color:var(--muted)">Select a chat</div>
        <div id="chat-sub"></div>
      </div>
      <div id="chat-actions">
        <span id="refresh-btn" onclick="refreshMessages()" title="Refresh">↻</span>
      </div>
    </div>

    <!-- messages -->
    <div id="messages-area">
      <div id="no-chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Choose a contact to see the backup</p>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Config ── */
const BASE = window.location.pathname.replace(/\/chat\/?$/, '/');

/* ── State ── */
let allContacts = [];
let activeTarget = null;
let oldestId = null;
let hasMore = false;
let refreshTimer = null;

/* ── Helpers ── */
const $ = id => document.getElementById(id);

function avatarColor(name) {
  const colors = ['#e17055','#00b894','#0984e3','#6c5ce7','#fd79a8','#00cec9','#fdcb6e','#e84393'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

function initials(name) {
  return (name || '?')[0].toUpperCase();
}

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function fmtDate(ts) {
  const d = new Date(ts * 1000);
  const today = new Date();
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], {day:'numeric', month:'short', year:'numeric'});
}

function fmtSidebarTime(ts) {
  const d = new Date(ts * 1000);
  const today = new Date();
  if (d.toDateString() === today.toDateString())
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  return d.toLocaleDateString([], {day:'numeric', month:'short'});
}

function truncate(text, len = 38) {
  if (!text) return '📎 Media';
  return text.length > len ? text.slice(0, len) + '…' : text;
}

/* ── Contacts ── */
async function loadContacts() {
  try {
    const r = await fetch(BASE + 'chat/contacts').then(r => r.json());
    allContacts = r.contacts || [];
    renderContacts(allContacts);
  } catch (e) {
    $('contacts-list').innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;font-size:13px">Could not load contacts</div>';
  }
}

function renderContacts(list) {
  const el = $('contacts-list');
  if (!list.length) {
    el.innerHTML = '<div style="padding:24px;color:var(--muted);text-align:center;font-size:13px">No backed-up chats yet</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="contact-item${c.target_username === activeTarget ? ' active' : ''}"
         id="ci-${c.target_username}"
         onclick="openChat('${c.target_username}', ${c.total})">
      <div class="avatar" style="background:${avatarColor(c.target_username)}">${initials(c.target_username)}</div>
      <div class="contact-info">
        <div class="contact-top">
          <span class="contact-name">@${c.target_username}</span>
          <span class="contact-time">${c.last_ts ? fmtSidebarTime(c.last_ts) : ''}</span>
        </div>
        <div class="contact-preview">
          ${c.last_action === 'sent' ? '<span style="color:var(--accent);font-size:12px">You: </span>' : ''}
          <span class="contact-preview-text">${truncate(c.last_message)}</span>
          <span class="badge">${c.total}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function filterContacts() {
  const q = $('search-input').value.toLowerCase().trim();
  renderContacts(q ? allContacts.filter(c => c.target_username.includes(q)) : allContacts);
}

/* ── Messages ── */
async function openChat(target, total) {
  activeTarget = target;
  oldestId = null;
  hasMore = false;

  // Mark active
  document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
  const ci = document.getElementById('ci-' + target);
  if (ci) ci.classList.add('active');

  // Update topbar
  $('chat-avatar').textContent = initials(target);
  $('chat-avatar').style.background = avatarColor(target);
  $('chat-name').textContent = '@' + target;
  $('chat-name').style.color = '';
  const contact = allContacts.find(c => c.target_username === target) || {};
  $('chat-sub').textContent =
    `${contact.total || 0} messages  ·  ${contact.received || 0} received  ·  ${contact.sent || 0} sent`;

  // Open on mobile
  document.body.classList.add('chat-open');

  // Show spinner
  $('messages-area').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

  await fetchMessages(target, null, true);
  startAutoRefresh();
}

async function fetchMessages(target, beforeId, scrollToBottom) {
  try {
    let url = BASE + 'chat/messages?target=' + encodeURIComponent(target) + '&limit=60';
    if (beforeId) url += '&before_id=' + beforeId;
    const r = await fetch(url).then(r => r.json());
    const msgs = r.messages || [];

    if (beforeId) {
      // Prepend older messages
      prependMessages(msgs);
    } else {
      renderMessages(msgs, scrollToBottom);
    }

    if (msgs.length >= 60) {
      oldestId = msgs[0].id;
      hasMore = true;
    } else {
      hasMore = false;
    }
    updateLoadMore();
  } catch (e) {
    if (!beforeId) {
      $('messages-area').innerHTML = '<div style="padding:24px;color:var(--del);text-align:center;font-size:13px">Failed to load messages</div>';
    }
  }
}

function renderMessages(msgs, scrollToBottom) {
  const area = $('messages-area');
  area.innerHTML = '';

  if (!msgs.length) {
    area.innerHTML = '<div style="padding:24px;color:var(--muted);text-align:center;font-size:13px">No messages</div>';
    return;
  }

  // Load more button slot
  const loadWrap = document.createElement('div');
  loadWrap.id = 'load-more-wrap';
  area.appendChild(loadWrap);

  let lastDate = null;
  const frag = document.createDocumentFragment();

  for (const msg of msgs) {
    const day = fmtDate(msg.timestamp);
    if (day !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.innerHTML = `<span>${day}</span>`;
      frag.appendChild(sep);
      lastDate = day;
    }
    frag.appendChild(makeBubble(msg));
  }

  area.appendChild(frag);

  if (msgs.length > 0) oldestId = msgs[0].id;

  if (scrollToBottom) area.scrollTop = area.scrollHeight;
}

function prependMessages(msgs) {
  const area = $('messages-area');
  const prevHeight = area.scrollHeight;

  const frag = document.createDocumentFragment();
  let lastDate = null;

  for (const msg of msgs) {
    const day = fmtDate(msg.timestamp);
    if (day !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.innerHTML = `<span>${day}</span>`;
      frag.appendChild(sep);
      lastDate = day;
    }
    frag.appendChild(makeBubble(msg));
  }

  // Insert after load-more-wrap (anchor.after() supports DocumentFragment)
  const anchor = $('load-more-wrap');
  anchor.after(frag);

  // Restore scroll position
  area.scrollTop = area.scrollHeight - prevHeight;
}

function makeBubble(msg) {
  const row = document.createElement('div');
  const action = msg.action || 'received';
  row.className = 'msg-row ' + (action === 'deleted' ? 'deleted' : action);

  let textHtml;
  if (action === 'deleted') {
    textHtml = `🗑 <em>${escHtml(msg.message_text || 'Message deleted')}</em>`;
  } else {
    textHtml = escHtml(msg.message_text || '📎 Media');
  }

  const tick = action === 'sent' ? '<span class="tick">✓✓</span>' : '';

  row.innerHTML = `
    <div class="bubble">
      <div class="bubble-text">${textHtml}</div>
      <div class="bubble-meta">${tick}<span>${fmtTime(msg.timestamp)}</span></div>
    </div>`;
  return row;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function updateLoadMore() {
  const wrap = $('load-more-wrap');
  if (!wrap) return;
  if (hasMore) {
    wrap.innerHTML = `<button id="load-more-btn" onclick="loadMore()">⬆ Load older messages</button>`;
  } else {
    wrap.innerHTML = '';
  }
}

async function loadMore() {
  if (!activeTarget || !oldestId) return;
  const btn = $('load-more-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
  await fetchMessages(activeTarget, oldestId, false);
}

/* ── Auto-refresh ── */
function startAutoRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setInterval(() => { if (activeTarget) refreshMessages(); }, 15000);
}

async function refreshMessages() {
  if (!activeTarget) return;
  // Reload contacts for updated counts
  loadContacts();
  // Reload messages (scroll to bottom only if already near bottom)
  const area = $('messages-area');
  const nearBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  await fetchMessages(activeTarget, null, nearBottom);
}

/* ── Mobile ── */
function closeChat() {
  document.body.classList.remove('chat-open');
  clearInterval(refreshTimer);
}

/* ── Init ── */
loadContacts();
</script>
</body>
</html>
